<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Quest - The Buggy Quiz</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js"></script>
</head>
<body>
  <header>
    <h1>🐛 Code Quest: The Buggy Quiz 🐛</h1>
    <p class="tagline">Test your CS knowledge... if the site even works.</p>
  </header>

  <main>
    <section id="quiz-card">
      <div id="progress">Question <span id="current">1</span> of <span id="total">5</span></div>
      <h2 id="question">Loading question...</h2>
      <ul id="choices"></ul>
      <button id="next-btn" onclick="nextQuestions()">Next →</button>
    </section>

    <section id="result-card" class="hidden">
      <h2>You scored <span id="score">0</span> / 5!</h2>
      <p id="message"></p>
      <button onclick="restart()">Play Again</button>
    </section>

    <aside id="leaderboard">
      <h3>Top Mentees</h3>
      <ol>
        <li>Ada — 5/5</li>
        <li>Linus  4/5</li>
        <li>Grace — 4/5</li>
        <li><img src="trophy.png"> Margaret — 3/5</li>
      </ol>
    </aside>
  </main>

  <footer>
    <p>Made with ❤️ and 🐞 for the CS Mentor-Mentee Program</p>
  </footer>
</body>
</html>
